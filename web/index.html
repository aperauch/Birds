<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5efe0" />
    <!-- Apply the saved theme before first paint to avoid a flash. -->
    <script>
      try {
        var t = localStorage.getItem("birds.theme");
        if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
    <title>Birds</title>
    <meta name="description" content="A live collage of birds heard outside, near a state road." />

    <!-- Icons / favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph / social unfurl -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Birds" />
    <meta property="og:url" content="https://birds.aperauch.com/" />
    <meta property="og:title" content="Birds" />
    <meta property="og:description" content="A live collage of birds heard outside, near a state road." />
    <meta property="og:image" content="https://birds.aperauch.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Birds — a live collage of birds heard at aperauch.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Birds" />
    <meta name="twitter:description" content="A live collage of birds heard outside, near a state road." />
    <meta name="twitter:image" content="https://birds.aperauch.com/og.png" />

    <!-- Self-hosted fonts (declared in styles.css); preload so text settles fast. -->
    <link rel="preload" href="/fonts/inter-latin-var.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/fraunces-latin-var.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body>
    <a class="skip" href="#collage">Skip to birds</a>
    <header id="bar">
      <div class="brand">
        <img class="logo" src="/logo.png" alt="" width="33" height="28" />
        <span class="dot" id="conn" role="img" aria-label="Connecting…" title="Connecting…"></span>
        <h1>Birds</h1>
        <span class="sub">birds heard at aperauch.com</span>
        <a id="day-link" class="view-link" href="#/day">Day →</a>
        <a id="view-link" class="view-link" href="#/trends">Trends →</a>
      </div>
      <div id="controls">
        <input
          id="search"
          class="search"
          type="search"
          placeholder="Search birds…"
          aria-label="Search species by name"
          autocomplete="off"
        />
        <nav id="views" class="seg" aria-label="layout"></nav>
        <div id="windows" class="dd-host" aria-label="time window"></div>
        <div id="sorts" class="dd-host" aria-label="sort order"></div>
        <button id="theme-btn" class="icon-btn" type="button" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
      </div>
      <div class="counts">
        <span id="species-count">0 species</span>
        <span id="detection-count">0 calls</span>
      </div>
    </header>

    <main id="collage" aria-label="bird collage"></main>
    <div id="collage-name" class="collage-name" aria-hidden="true"></div>

    <section id="trends" class="trends" aria-label="analytics" hidden></section>
    <section id="day" class="day-view" aria-label="day explorer" hidden></section>

    <aside id="ticker" aria-label="live feed"></aside>

    <!-- Screen-reader announcements for new detections (visually hidden). -->
    <p id="live-status" class="sr-only" aria-live="polite"></p>

    <div id="empty" hidden>
      <p>No birds in this window yet — the page updates itself as calls come in.</p>
    </div>

    <div id="modal" class="modal" hidden></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
